services:
  db:
    image: postgres:15
    container_name: energy_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: energy_forecast
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    build: 
      context: .
      dockerfile: ./frontend/Dockerfile
    volumes:
      - ./frontend:/app
      - ./src:/app/src
      - ./.streamlit:/app/.streamlit
    container_name: energy_streamlit
    ports:
      - "8501:8501"
    environment:
      - DB_HOST=db
      - DB_NAME=energy_forecast
      - DB_USER=postgres
      - DB_PASS=password123

  analytics:
    build:
      context: .                          # Look at the whole root folder
      dockerfile: ./analytics/Dockerfile  # But read these specific instructions
    volumes:
      - ./analytics:/app
      - ./src:/app/src
      - ./.streamlit:/app/.streamlit
      - ./syles:/app/styles

    container_name: energy_jupyter
    depends_on:
      - db
    ports:
      - "8888:8888"
    environment:
      - DB_HOST=db
      - DB_NAME=energy_forecast
      - DB_USER=postgres
      - DB_PASS=password123

volumes:
  postgres_data: